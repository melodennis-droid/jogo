<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apocalipse Zumbi em CSS</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #1a1a2e;
        overflow: hidden;
        font-family: 'Courier New', Courier, monospace;
        cursor: crosshair;
    }

    .game-board {
        position: relative;
        width: 100vw;
        height: 100vh;
        counter-reset: score; /* Inicia o placar */
    }

    /* CORREÇÃO 1: Em vez de display: none, deixamos invisível para evitar bugs de clique no label */
    input[type="checkbox"] {
        position: absolute;
        opacity: 0;
        pointer-events: none;
    }

    .zombie {
        position: absolute;
        bottom: -100px;
        font-size: 70px;
        cursor: crosshair;
        transition: transform 0.1s;
        animation: riseUp 4s infinite ease-in-out;
        z-index: 10;
        /* CORREÇÃO 2: Impede que o clique rápido "selecione" o emoji como se fosse texto */
        user-select: none; 
        -webkit-user-select: none;
    }

    .zombie:hover {
        transform: scale(1.2);
        filter: drop-shadow(0 0 10px red);
    }

    input[type="checkbox"]:checked {
        counter-increment: score;
    }
    
    input[type="checkbox"]:checked + .zombie {
        display: none;
    }

    .z1 { left: 10%; animation-duration: 3s; }
    .z2 { left: 30%; animation-duration: 5s; animation-delay: 1s; }
    .z3 { left: 50%; animation-duration: 4s; animation-delay: 2s; }
    .z4 { left: 70%; animation-duration: 6s; animation-delay: 0.5s; }
    .z5 { left: 85%; animation-duration: 3.5s; animation-delay: 1.5s; }

    @keyframes riseUp {
        0%   { bottom: -100px; }
        50%  { bottom: 60vh; }
        100% { bottom: -100px; }
    }

    .score-board {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #e94560;
        font-size: 30px;
        font-weight: bold;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 20px;
        border: 2px solid #e94560;
        border-radius: 10px;
        pointer-events: none;
        z-index: 20;
    }

    .score-board::after {
        content: counter(score) " / 5";
    }

    .ground {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100px;
        background: linear-gradient(to top, #0f0f1b, transparent);
        pointer-events: none;
        z-index: 15;
    }
</style>
</head>
<body>

<div class="game-board">
    <input type="checkbox" id="zombie1">
    <label for="zombie1" class="zombie z1">🧟</label>

    <input type="checkbox" id="zombie2">
    <label for="zombie2" class="zombie z2">🧟</label>

    <input type="checkbox" id="zombie3">
    <label for="zombie3" class="zombie z3">🧟</label>

    <input type="checkbox" id="zombie4">
    <label for="zombie4" class="zombie z4">🧟‍♂️</label>

    <input type="checkbox" id="zombie5">
    <label for="zombie5" class="zombie z5">🧟‍♀️</label>

    <div class="ground"></div>

    <div class="score-board">Zumbis Eliminados: </div>
</div>

</body>
</html>
